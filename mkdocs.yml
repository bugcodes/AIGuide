site_name: AIGuide - AI Agent 学习指南
site_description: AI Agent 开发者的系统化学习指南
site_url: https://bugcodes.github.io/AIGuide

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs_sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

nav:
  - 首页: index.md
  - 🤖 OpenClaw: openclaw/index.md
  - 💻 Claude Code: claude-code/README.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

plugins:
  - search