site_name: AIGuide - AI Agent 学习指南
site_description: AI Agent 开发者的系统化学习指南
site_url: https://bugcodes.github.io/AIGuide

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - OpenClaw:
    - openclaw/README.md
    - 架构:
      - openclaw/01-Architecture/L01.md
      - openclaw/01-Architecture/L02.md
    - Agent Loop:
      - openclaw/02-AgentLoop/L03.md
      - openclaw/02-AgentLoop/L04.md
      - openclaw/02-AgentLoop/L05.md
      - openclaw/02-AgentLoop/L06.md
      - openclaw/02-AgentLoop/L07.md
    - Memory:
      - openclaw/03-Memory/L08.md
      - openclaw/03-Memory/L09.md
      - openclaw/03-Memory/L10.md
      - openclaw/03-Memory/L11.md
    - 路由与协作:
      - openclaw/04-Routing/L12.md
      - openclaw/04-Routing/L13.md
      - openclaw/04-Routing/L14.md
      - openclaw/04-Routing/L15.md
    - 插件生态:
      - openclaw/05-Plugins/L20.md
      - openclaw/05-Plugins/L21.md
      - openclaw/05-Plugins/L22.md
      - openclaw/05-Plugins/L23.md
    - 安全与高可用:
      - openclaw/06-Security/L24.md
      - openclaw/06-Security/L25.md
      - openclaw/06-Security/L26.md
      - openclaw/06-Security/L27.md
    - 演练场:
      - openclaw/Labs/L28.md
      - openclaw/Labs/L29.md
      - openclaw/Labs/L30.md
      - openclaw/Labs/L31.md
      - openclaw/Labs/L32.md
  - Claude Code:
    - claude-code/README.md
    - 开篇:
      - claude-code/01-开篇-共生而非替代.md
      - claude-code/02-开篇-1小时解锁高级用法.md
    - 基础理论:
      - claude-code/03-基础-登台望远.md
      - claude-code/04-基础-过目不忘.md
      - claude-code/05-基础-分而治之.md
      - claude-code/06-基础-两体裁衣.md
      - claude-code/07-基础-明察秋毫.md
      - claude-code/08-基础-去芜存精.md
      - claude-code/09-基础-百舸争流.md
      - claude-code/10-基础-群策群力.md
    - 核心技能:
      - claude-code/11-技能-触类旁通.md
      - claude-code/12-技能-另辟蹊径.md
      - claude-code/13-技能-集腋成裘.md
      - claude-code/14-技能-千车之鉴.md
      - claude-code/15-技能-横看成岭.md
      - claude-code/16-技能-顺藤摸瓜.md
      - claude-code/17-技能-鉴往知来.md
