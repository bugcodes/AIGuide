  - Hermes: hermes/README.md
  - Agent Interview: agent-interview/README.md
  - Multi-Agent: multi-agent/README.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

plugins:
  - search
